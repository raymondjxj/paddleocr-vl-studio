<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PaddleOCR VL Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">PaddleOCR-VL on Apple Silicon</p>
          <h1>把本地 OCR 能力，变成一个可以上线的识别工作台。</h1>
          <p class="lede">
            前端部署到 Netlify，后端按官方 Apple Silicon 指引运行在你的 Mac 上。
            上传图片或 PDF，立即查看结构化解析结果与 Markdown 输出。
          </p>
        </div>
        <div class="hero-panel">
          <div class="panel-glow"></div>
          <div class="status-row">
            <span>环境</span>
            <strong id="healthText">等待连接</strong>
          </div>
          <div class="status-row">
            <span>后端 URL</span>
            <strong id="backendText">未设置</strong>
          </div>
        </div>
      </section>

      <section class="workspace">
        <div class="workspace-head">
          <div>
            <p class="section-kicker">Workspace</p>
            <h2>上传文件并调用 OCR 服务</h2>
          </div>
          <p class="workspace-note">
            推荐本地开发时使用 `http://127.0.0.1:5050`，上线后再切换到公开后端地址。
          </p>
        </div>

        <form id="ocrForm" class="control-grid">
          <label class="field">
            <span>后端地址</span>
            <input
              id="backendUrl"
              name="backendUrl"
              type="url"
              placeholder="http://127.0.0.1:5050"
              required
            />
          </label>

          <label class="field">
            <span>识别后端</span>
            <select id="backendMode" name="backendMode">
              <option value="">默认 PaddleOCR-VL</option>
              <option value="mlx-vlm-server">MLX-VLM Server</option>
            </select>
          </label>

          <label class="field file-field">
            <span>上传文件</span>
            <input id="uploadFile" name="file" type="file" accept="image/*,.pdf" required />
          </label>

          <button id="submitButton" type="submit" class="submit-button">
            开始识别
          </button>
        </form>

        <div id="message" class="message" aria-live="polite"></div>
      </section>

      <section class="results-section">
        <div class="results-head">
          <div>
            <p class="section-kicker">Results</p>
            <h2>结构化输出</h2>
          </div>
        </div>

        <div class="results-grid">
          <article class="result-block">
            <h3>Markdown</h3>
            <pre id="markdownOutput" class="result-surface">等待识别结果...</pre>
          </article>
          <article class="result-block">
            <h3>JSON</h3>
            <pre id="jsonOutput" class="result-surface">等待识别结果...</pre>
          </article>
        </div>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
  </html>
